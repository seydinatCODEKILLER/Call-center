services:
  db:
    image: postgres:15-alpine
    container_name: db_call221_local
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: api_call221_local
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - db
    volumes:
      - ./src:/app/src           # Pour le hot-reload (nodemon)
      - ./prisma:/app/prisma     # Pour éditer les schémas à la volée
    # En local : generate + push le schéma + lance le dev (nodemon)
    command: sh -c "npx prisma generate && npx prisma db push && pnpm run dev"

volumes:
  postgres_data: