name: Build and Deploy API

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Se connecter à Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Créer le tag avec le SHA du commit
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ vars.DOCKERHUB_USERNAME }}/call-center-api
          tags: |
            type=sha

      - name: Construire et pousser l'image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}

      - name: Mettre à jour et redémarrer sur EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/call-center-app
            sed -i "s|image: afrocodelatest/call-center-api:.*|image: ${{ steps.meta.outputs.tags }}|g" docker-compose.prod.yml
            docker compose -f docker-compose.prod.yml pull api
            docker compose -f docker-compose.prod.yml up -d api

      - name: Vérifier que l'API répond
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sleep 15
            STATUS=$(docker inspect --format='{{.State.Status}}' api_call221)
            if [ "$STATUS" != "running" ]; then
              echo "❌ Container arrêté. Logs :"
              docker logs api_call221 --tail 50
              exit 1
            fi
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/health)
            if [ "$HTTP_CODE" != "200" ]; then
              echo "❌ Health check échoué. Logs :"
              docker logs api_call221 --tail 50
              exit 1
            fi
            echo "✅ API opérationnelle"

      - name: Notification succès
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "✅ Déploiement réussi"
          to: ${{ secrets.GMAIL_USERNAME }}
          from: GitHub Actions
          body: "✅ Déploiement réussi ! Image: ${{ steps.meta.outputs.tags }}"

      - name: Notification échec
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "❌ Déploiement échoué"
          to: ${{ secrets.GMAIL_USERNAME }}
          from: GitHub Actions
          body: "❌ Échec sur le commit ${{ github.sha }}"