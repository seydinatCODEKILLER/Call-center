---
- name: Configuration du serveur Call221
  hosts: call221
  become: true
  vars_files:
    - vars/secrets.yml

  tasks:
    - name: Mettre à jour les paquets
      apt:
        update_cache: yes
        upgrade: yes

    - name: Installer les dépendances Docker
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present

    - name: Ajouter la clé GPG Docker
      shell: |
        install -m 0755 -d /etc/apt/keyrings
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
        chmod a+r /etc/apt/keyrings/docker.gpg

    - name: Ajouter le dépôt Docker
      shell: |
        echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo $VERSION_CODENAME) stable" | tee /etc/apt/sources.list.d/docker.list > /dev/null

    - name: Installer Docker
      apt:
        update_cache: yes
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present

    - name: Ajouter ubuntu au groupe docker
      user:
        name: ubuntu
        groups: docker
        append: yes

    - name: Créer le dossier call221
      file:
        path: /home/ubuntu/call221
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0755'

    - name: Créer le fichier .env
      copy:
        dest: /home/ubuntu/call221/.env
        owner: ubuntu
        group: ubuntu
        mode: '0600'
        content: |
          POSTGRES_USER={{ postgres_user }}
          POSTGRES_PASSWORD={{ postgres_password }}
          POSTGRES_DB={{ postgres_db }}
          DATABASE_URL=postgresql://{{ postgres_user }}:{{ postgres_password }}@db:5432/{{ postgres_db }}?schema=public
          CLOUDINARY_CLOUD_NAME={{ cloudinary_cloud_name }}
          CLOUDINARY_API_KEY={{ cloudinary_api_key }}
          CLOUDINARY_API_SECRET={{ cloudinary_api_secret }}
          PORT=3000
          NODE_ENV=production
          HOST=0.0.0.0

    - name: Copier le docker-compose.yml
      copy:
        dest: /home/ubuntu/call221/docker-compose.yml
        owner: ubuntu
        group: ubuntu
        content: |
          services:
            db:
              image: postgres:15-alpine
              container_name: db_call221
              restart: always
              environment:
                POSTGRES_USER: {{ postgres_user }}
                POSTGRES_PASSWORD: {{ postgres_password }}
                POSTGRES_DB: {{ postgres_db }}
              ports:
                - "5433:5432"
              volumes:
                - postgres_data:/var/lib/postgresql/data

            api:
              image: afrocodelatest/call-center-api:sha-c47236c
              container_name: api_call221
              restart: always
              ports:
                - "3000:3000"
              env_file:
                - .env
              depends_on:
                - db
              command: sh -c "npx prisma db push && pnpm start"

          volumes:
            postgres_data:

    - name: Lancer les containers
      shell: docker compose up -d
      args:
        chdir: /home/ubuntu/call221