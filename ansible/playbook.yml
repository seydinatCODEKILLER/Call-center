---
- name: Configuration du serveur Call221
  hosts: call221
  become: true

  tasks:
    - name: Mettre à jour les paquets
      apt:
        update_cache: yes
        upgrade: yes

    - name: Installer les dépendances Docker
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present

    - name: Ajouter la clé GPG Docker
      shell: |
        install -m 0755 -d /etc/apt/keyrings
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
        chmod a+r /etc/apt/keyrings/docker.gpg

    - name: Ajouter le dépôt Docker
      shell: |
        echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo $VERSION_CODENAME) stable" | tee /etc/apt/sources.list.d/docker.list > /dev/null

    - name: Installer Docker
      apt:
        update_cache: yes
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present

    - name: Ajouter ubuntu au groupe docker
      user:
        name: ubuntu
        groups: docker
        append: yes

    - name: Créer le dossier call221
      file:
        path: /home/ubuntu/call221
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0755'

    - name: Copier le docker-compose.yml
      copy:
        dest: /home/ubuntu/call221/docker-compose.yml
        owner: ubuntu
        group: ubuntu
        content: |
          services:
            db:
              image: postgres:15-alpine
              container_name: db_call221
              restart: always
              environment:
                POSTGRES_USER: postgres
                POSTGRES_PASSWORD: Liverpool040
                POSTGRES_DB: call221
              ports:
                - "5433:5432"
              volumes:
                - postgres_data:/var/lib/postgresql/data

            api:
              image: afrocodelatest/call-center-api:sha-c47236c
              container_name: api_call221
              restart: always
              ports:
                - "3000:3000"
              environment:
                - DATABASE_URL=postgresql://postgres:Liverpool040@db:5432/call221?schema=public
                - CLOUDINARY_CLOUD_NAME=dvzo0zlpg
                - CLOUDINARY_API_KEY=829332251999145
                - CLOUDINARY_API_SECRET=1ScxioNb7fwp0RWwlcML8_JwcOc
                - PORT=3000
                - NODE_ENV=production
                - HOST=0.0.0.0
              depends_on:
                - db
              command: sh -c "npx prisma db push && pnpm start"

          volumes:
            postgres_data:

    - name: Lancer les containers
      shell: docker compose up -d
      args:
        chdir: /home/ubuntu/call221
